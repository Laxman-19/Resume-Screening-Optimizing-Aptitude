{% extends "base.html" %}
{% block title %}Link Expired — TalentLens{% endblock %}
{% block content %}
<section class="py-5">
    <div class="container" style="max-width:560px;">
        <div class="card shadow-sm text-center"><div class="card-body p-5">
            <div class="feature-icon mx-auto" style="background:var(--warning-soft);color:var(--warning);"><i class="fas fa-clock"></i></div>
            <h1 class="h3 mt-3 mb-2">This link has expired</h1>
            <p class="text-secondary mb-1">Test links are valid for 7 days from the date they're sent.</p>
            <p class="text-secondary mb-0">Please contact the hiring team to request a new link.</p>
        </div></div>
    </div>
</section>
{% endblock %}
